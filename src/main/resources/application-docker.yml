# ─────────────────────────────────────────────────────────────────────────────
# Profile: docker  (production / VirtualBox-Portainer runtime)
#
# All connection details come from environment variables injected by the
# Portainer stack (see virtualbox-stack/docker-compose.yml). No secrets here.
# Activated via SPRING_PROFILES_ACTIVE=docker (set in the Dockerfile / stack).
# ─────────────────────────────────────────────────────────────────────────────
spring:
  # ── Spring Cloud Config ─────────────────────────────────────────────────
  # Pull centralized config (dbcleaner.yml / dbcleaner-docker.yml) from the
  # config-server. Boot 4.0 uses spring.config.import (no bootstrap.yml).
  # "configserver:" (required) + fail-fast means the container waits/retries
  # until the config-server is reachable; a missing dbcleaner entry in the git
  # repo is fine (empty config, app still starts on its local env vars).
  config:
    import: "configserver:${CONFIG_SERVER_URL}"
  cloud:
    config:
      enabled: true
      username: ${SPRING_CLOUD_CONFIG_USERNAME}
      password: ${SPRING_CLOUD_CONFIG_PASSWORD}
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 2000
        max-interval: 5000
        multiplier: 1.5
  # Never let the container try to manage a docker-compose lifecycle at runtime.
  docker:
    compose:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${SERVER_PORT:8085}

# Actuator: expose health only, needed by the container HEALTHCHECK and by
# Portainer. Probes give k8s-style liveness/readiness if you move there later.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

logging:
  level:
    root: INFO
    me.sathish.dbcleaner: INFO

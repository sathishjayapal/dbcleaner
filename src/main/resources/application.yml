spring:
  application:
    name: dbcleaner
  cloud:
    config:
      # Config-server is only used under the 'docker' profile (see
      # application-docker.yml, which sets spring.config.import=configserver:).
      # spring-cloud-starter-config otherwise fails local/IDE startup with
      # "No spring.config.import property has been defined". Turning off just
      # the startup check lets local runs skip config-server; it does NOT
      # contact any server unless an import is present.
      import-check:
        enabled: false
  datasource:
    url: ${JDBC_DATABASE_URL}
    username: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
  messages:
    basename: messages,messagesWeb
  docker:
    compose:
      lifecycle-management: start-only
      enabled: false
  session:
    jdbc.initialize-schema: always
app:
  datasources:
    runs-app:
      url: ${RUNS_APP_DB_URL}
      username: ${RUNS_APP_DB_USERNAME}
      password: ${RUNS_APP_DB_PASSWORD}
    eventstracker:
      url: ${EVENTS_TRACKER_DB_URL}
      username: ${EVENTS_TRACKER_DB_USERNAME}
      password: ${EVENTS_TRACKER_DB_PASSWORD}
    runs-ai:
      url: ${RUNS_AI_DB_URL}
      username: ${RUNS_AI_DB_USERNAME}
      password: ${RUNS_AI_DB_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
server:
  port: 8085

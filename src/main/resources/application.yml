spring:
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/dbcleaner}
    username: ${JDBC_DATABASE_USERNAME:postgres}
    password: ${JDBC_DATABASE_PASSWORD:<<YOUR_PASSWORD>>}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
  messages:
    basename: messages,messagesWeb
  docker:
    compose:
      lifecycle-management: start-only
  session:
    jdbc.initialize-schema: always
app:
  datasources:
    runs-app:
      url: ${RUNS_APP_DB_URL:jdbc:postgresql://localhost:5443/runsapp_db}
      username: ${RUNS_APP_DB_USERNAME:postgres}
      password: ${RUNS_APP_DB_PASSWORD:}
    eventstracker:
      url: ${EVENTS_TRACKER_DB_URL:jdbc:postgresql://localhost:6433/event-service}
      username: ${EVENTS_TRACKER_DB_USERNAME:postgres}
      password: ${EVENTS_TRACKER_DB_PASSWORD:}
    runs-ai:
      url: ${RUNS_AI_DB_URL:jdbc:postgresql://localhost:5444/runs-ai-analyzer}
      username: ${RUNS_AI_DB_USERNAME:postgres}
      password: ${RUNS_AI_DB_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

home.index.headline=DB Cleaner
home.index.tagline=Purge stale records across your service databases — with a full audit trail.
home.index.text=DB Cleaner sweeps expendable records out of your connected service databases in a single run. Every deleted row is captured in an audit log so you always know what was removed, from where, and when.

name: CI/CD → Docker Hub

# Builds dbcleaner (Spring Boot app + webpack frontend, all inside the
# multi-stage Dockerfile) and pushes a fresh :latest image to Docker Hub on
# every push to the default branch. Watchtower running in the VirtualBox /
# Portainer VM polls Docker Hub every 5 min and redeploys automatically.

on:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'mvnw'
      - '.mvn/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'webpack.config.js'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [ master ]
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/dbcleaner

jobs:
  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # The VirtualBox VM is linux/amd64; build for it explicitly.
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Write summary
        if: always()
        run: |
          echo "## Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: \`${{ env.IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA tag**: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "- **Watchtower** will auto-redeploy in ≤ 5 min" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- PR build only — image not pushed" >> "$GITHUB_STEP_SUMMARY"
          fi
